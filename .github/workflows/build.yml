name: Build MCS OS ISO

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap debian-archive-keyring

      - name: Configure and Build ISO
        run: |
          sudo lb config --mode debian --architecture amd64 --distribution bookworm --archive-areas "main contrib non-free non-free-firmware"
          sudo lb build

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcs-os.iso
          path: "*.iso"
