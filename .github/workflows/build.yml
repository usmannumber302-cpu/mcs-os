name: Build ISO
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install live-build
        run: sudo apt-get update && sudo apt-get install -y live-build
      - name: Build ISO
        run: sudo lb build
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: mcs-os
          path: "*.iso"
