name: Build MCS OS ISO

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build ISO using Debian Container
        run: |
          docker run --privileged -v ${{ github.workspace }}:/build -w /build debian:bookworm bash -c "\
            apt-get update && \
            apt-get install -y live-build debootstrap && \
            lb config --architecture amd64 --distribution bookworm --archive-areas 'main contrib non-free non-free-firmware' && \
            lb build"

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcs-os.iso
          path: "*.iso"
